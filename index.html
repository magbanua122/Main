<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pepper Script Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #050816, #0b1025);
      color: white;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background-image:
        radial-gradient(circle at top, rgba(128,0,255,0.3), transparent 50%);
    }

    .badge {
      display: inline-block;
      padding: 8px 18px;
      border: 2px solid #8a2be2;
      border-radius: 20px;
      color: #c084fc;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 48px;
      margin: 0;
    }

    .subtitle {
      color: #b0b0b0;
      margin-top: 10px;
    }

    .card {
      max-width: 400px;
      margin: 40px auto;
      background: #12172d;
      border-radius: 20px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      display: block;
    }

    .content {
      padding: 20px;
    }

    .button {
      display: block;
      text-align: center;
      background: #7c3aed;
      color: white;
      text-decoration: none;
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="badge">ROBLOX SCRIPT HUB</div>
    <h1>Pepper Script Hub</h1>
    <p class="subtitle">
      Select a game to get the script — copy with one click.
    </p>
  </div>

  <div class="card">
    <img src="your-image.png" alt="Grow A Garden 2">
    <div class="content">
      <h2>Grow A Garden 2</h2>
      <p>Auto farm, auto collect, and more features.</p>
      <a class="button" href="#">Get Script</a>
    </div>
  </div>

</body>
</html>

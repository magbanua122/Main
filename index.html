<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pepper Script Hub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b1020;
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    margin:30px 0;
    font-size:40px;
}

.card{
    max-width:400px;
    margin:20px auto;
    background:#151d30;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(0,0,0,.5);
}

.card img{
    width:100%;
    display:block;
}

.content{
    padding:20px;
}

.tag{
    display:inline-block;
    background:#1a3a4a;
    color:#5df0d2;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
}

.content h2{
    margin:15px 0;
}

.content p{
    color:#bdbdbd;
    line-height:1.5;
}

.button{
    display:block;
    text-align:center;
    background:#19d3a2;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:12px;
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>My Script Hub</h1>

<div class="card">
    <img src="https://picsum.photos/400/200" alt="Game">

    <div class="content">
        <span class="tag">SIMULATOR</span>

        <h2>Grow A Garden 2</h2>

        <p>
            Auto farm, auto collect and many more features.
        </p>

        <a class="button" href="script.html">Get Script</a>
    </div>
</div>

</body>
</html>
